<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f5f0" />
    <title>小筑 · 用对话构建应用</title>

    <!-- 字体：Bricolage Grotesque（UI/标题） + Instrument Serif（品牌字） + JetBrains Mono（代码/数字） -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />

    <!-- 首屏加载占位：在主 JS 下载/解析、React 挂载前显示，避免纯白屏。
         React 挂载时会用应用内容替换 #root 的子节点，这个占位随之消失。 -->
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f7f5f0;
      }
      #initial-loader .spinner {
        width: 34px;
        height: 34px;
        border: 3px solid rgba(0, 0, 0, 0.12);
        border-top-color: rgba(0, 0, 0, 0.55);
        border-radius: 50%;
        animation: il-spin 0.7s linear infinite;
      }
      @keyframes il-spin {
        to { transform: rotate(360deg); }
      }
      @media (prefers-color-scheme: dark) {
        #initial-loader { background: #1a1a1a; }
        #initial-loader .spinner {
          border-color: rgba(255, 255, 255, 0.15);
          border-top-color: rgba(255, 255, 255, 0.6);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader"><div class="spinner"></div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
