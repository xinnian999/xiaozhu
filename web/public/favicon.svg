<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="小筑">
  <!-- 小筑图标：透明背景的小房子角色，屋顶呼应“筑”，表情让品牌更亲近 -->
  <defs>
    <linearGradient id="roof" x1="15" y1="11" x2="51" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff6f8f"/>
      <stop offset="1" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="wall" x1="20" y1="28" x2="44" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff8ec"/>
      <stop offset="1" stop-color="#ffdca8"/>
    </linearGradient>
    <linearGradient id="window" x1="24" y1="38" x2="40" y2="51" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff7ca"/>
      <stop offset="1" stop-color="#65d7f8"/>
    </linearGradient>
  </defs>

  <g stroke="#20151b" stroke-linecap="round" stroke-linejoin="round">
    <!-- 细小手脚先画在主体后面，保持透明背景且不抢主体轮廓 -->
    <path d="M19.2 39.4c-4.3 0-7.3-2.2-8.4-5.6" fill="none" stroke-width="4"/>
    <path d="M44.8 38.8c4.2-.5 6.8-3.1 7.8-6.6" fill="none" stroke-width="4"/>
    <path d="M26.5 52.8 23.7 58" fill="none" stroke-width="4"/>
    <path d="M37.5 52.8 40.3 58" fill="none" stroke-width="4"/>

    <!-- 小房子的身体 -->
    <path
      fill="url(#wall)"
      stroke-width="3.6"
      d="M18.5 30.5h27v16.8c0 4.2-3.4 7.7-7.7 7.7H26.2c-4.2 0-7.7-3.4-7.7-7.7V30.5Z"
    />

    <!-- 屋顶用更醒目的品牌红，在 favicon 小尺寸下最容易识别 -->
    <path
      fill="url(#roof)"
      stroke-width="3.6"
      d="M12.2 30.4 29.8 14c1.3-1.2 3.2-1.2 4.4 0l17.6 16.4c1.6 1.5.5 4.1-1.7 4.1H13.9c-2.2 0-3.3-2.6-1.7-4.1Z"
    />

    <!-- 脸部和小窗，统一用粗线保证小尺寸清晰 -->
    <circle cx="26.2" cy="38.6" r="2.2" fill="#20151b" stroke="none"/>
    <circle cx="37.8" cy="38.6" r="2.2" fill="#20151b" stroke="none"/>
    <path d="M28.7 45.1c1.7 1.6 4.9 1.6 6.6 0" fill="none" stroke-width="2.6"/>
    <circle cx="22.7" cy="44.2" r="2.1" fill="#ff8aa6" opacity=".72" stroke="none"/>
    <circle cx="41.3" cy="44.2" r="2.1" fill="#ff8aa6" opacity=".72" stroke="none"/>

    <path
      fill="url(#window)"
      stroke-width="2.8"
      d="M28 49.5h8v4.3c0 .7-.5 1.2-1.2 1.2h-5.6c-.7 0-1.2-.5-1.2-1.2v-4.3Z"
    />
  </g>
</svg>
